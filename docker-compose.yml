services:
  primary:
    image: postgres:15-alpine
    container_name: pg_primary
    restart: ${POSTGRES_RESTART_POLICY:-unless-stopped}
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/primary.conf:/etc/postgresql/postgresql.conf
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PRIMARY_HOST_PORT}:5432"

  replica:
    image: postgres:15-alpine
    container_name: pg_replica
    restart: ${POSTGRES_RESTART_POLICY:-unless-stopped}
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - replica_data:/var/lib/postgresql/data
      - ./docker/postgres/primary.conf:/etc/postgresql/postgresql.conf
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./docker/postgres/init-replica.sh:/usr/local/bin/init-replica.sh
    entrypoint: [ "/bin/sh", "/usr/local/bin/init-replica.sh" ]
    env_file:
      - .env
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_REPLICA_HOST_PORT}:5432"

  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: django_app
    restart: ${APP_RESTART_POLICY:-unless-stopped}
    entrypoint: /app/docker/django/entrypoint.sh
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    env_file:
      - .env
    depends_on:
      primary:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: ${NGINX_RESTART_POLICY:-unless-stopped}
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles:ro
    ports:
      - "8000:80"
    depends_on:
      - web

volumes:
  postgres_data:
  replica_data:
  static_volume:
