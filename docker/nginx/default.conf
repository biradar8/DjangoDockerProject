# GLOBAL SETTINGS

map $http_cf_connecting_ip $client_real_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

# RATE LIMITING: Use the smart variable
limit_req_zone $client_real_ip zone=django_limit:10m rate=5r/s;

# ACCESS LOGGING: Log the smart variable
log_format security_log '$client_real_ip - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'LIMIT_STATUS=$limit_req_status';

# SERVER SETTINGS
upstream django {
    server web:8000;
}

server {
    listen 80;

    access_log /var/log/nginx/access.log security_log;

    # 1. Static Files: Served directly by Nginx
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 2. Django App: Proxied to the Gunicorn/Uvicorn server
    location / {
        limit_req zone=django_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://django;

        # Standard proxy headers using the smart variable
        proxy_set_header X-Forwarded-For $client_real_ip;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $client_real_ip;
        proxy_redirect off;
    }
}