{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'blog/css/blog-base.css' %}" />
    <title>
      {% block title %}
        Django GraphQL Blog
      {% endblock %}
    </title>

    <meta name="description" content="{% block meta_description %}A modern Django GraphQL blog{% endblock %}" />

    <!-- Bootstrap 5 CSS for quick, responsive styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    {% block extra_head %}

    {% endblock %}
  </head>
  <body class="bg-light">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
      <div class="container">
        <!-- Brand -->
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
          <span class="brand-dot"></span>
          Django Docker Blog
        </a>

        <!-- Mobile toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>

        <!-- Nav items -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <!-- Left side (future: categories / explore) -->
          <ul class="navbar-nav me-auto gap-lg-2">
            <li class="nav-item">
              <a class="nav-link" href="/blog/">Blogs</a>
            </li>
          </ul>

          <!-- Right side -->
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item">
              <a class="nav-link" href="/admin/">Admin</a>
            </li>

            <!-- Future auth -->
            <li class="nav-item">
              <a class="btn btn-outline-light btn-sm px-3 ms-lg-2" href="#">Login</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="container">
      {% block content %}
        <!-- Child templates will inject their content here -->
      {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center mt-5 mb-4 text-muted">
      <small>&copy; {% now 'Y' %}Django GraphQL Blog</small>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}

    {% endblock %}
  </body>
</html>
