<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
    <h1 class="mb-0 fw-bold">{{ title|default:"Latest Posts" }}</h1>

    <form method="get" action="{{ action_url }}" class="d-flex flex-wrap" onsubmit="cleanForm(this)">

        <select name="category"
                class="form-select"
                style="min-width: 160px;">
            <option value="">All Categories</option>
            {% for cat in categories %}
                <option value="{{ cat.slug }}" {% if selected_category == cat.slug %} selected {% endif %}>
                    {{ cat.name }}
                </option>
            {% endfor %}
        </select>

        <input class="form-control"
               type="search"
               name="q"
               placeholder="Search posts..."
               value="{{ search_term }}">

        <button class="btn btn-primary" type="submit">
            Search
        </button>

        {% if search_term or selected_category %}
            <a href="{{ action_url }}" class="btn btn-outline-secondary">
                Clear
            </a>
        {% endif %}
    </form>
</div>
