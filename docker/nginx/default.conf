upstream django {
    server web:8000;
}

server {
    listen 80;

    # 1. Static Files: Served directly by Nginx
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 2. Django App: Proxied to the Gunicorn/Uvicorn server
    location / {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}